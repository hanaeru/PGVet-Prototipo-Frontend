<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PGVet — Prototipo funcional de plataforma de gestión veterinaria con login, roles y 11 módulos.">
  <meta name="theme-color" content="#8fbc8f">
  <title>PGVet — Plataforma de Gestión Veterinaria</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Login -->
    <section id="view-login" class="view active">
      <div class="login-window">
        <div class="window-titlebar">
          <span class="window-title">PGVet — Iniciar Sesión</span>
        </div>
        <div class="window-body login-body">
          <div class="login-logo">🐾 PGVET</div>
          <p class="login-subtitle">Plataforma de Gestión Veterinaria</p>
          <form id="login-form">
            <label for="login-email">Correo electrónico</label>
            <input type="email" id="login-email" placeholder="usuario@pgvet.cl" required>
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="••••" required>
            <p id="login-error" class="error-msg hidden">Credenciales inválidas</p>
            <button type="submit" class="btn btn-primary">Ingresar</button>
          </form>
        </div>
      </div>
    </section>

    <!-- App shell -->
    <section id="view-app" class="view hidden">
      <aside class="sidebar">
        <div class="sidebar-brand">🐾 PGVET</div>
        <nav id="sidebar-nav" class="sidebar-nav"></nav>
        <button id="btn-logout" class="sidebar-logout bevel-out">Log Out</button>
      </aside>

      <main class="main">
        <header class="main-header">
          <h1 id="page-title">Dashboard</h1>
          <div class="user-badge">
            <span id="user-name"></span>
            <span id="user-role" class="role-tag"></span>
          </div>
        </header>

        <div id="toast-container" class="toast-container"></div>
        <div id="page-content" class="page-content"></div>
      </main>
    </section>
  </div>

  <!-- Modal template -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-window" role="dialog" aria-modal="true">
      <div class="window-titlebar modal-titlebar">
        <span id="modal-title" class="window-title">Modal</span>
        <button id="modal-close" class="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div id="modal-body" class="window-body modal-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
